# İnşaat Borsam Supabase local config. project_id Sprint 1'de gerçek Supabase projesi açılınca güncellenecek.
# Referans: https://supabase.com/docs/guides/local-development/cli/config

project_id = "insaatborsam-placeholder"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
# Sprint 1'de Vonage veya Netgsm provider config eklenecek (Türkçe SMS OTP için).
enable_signup = false
enable_confirmations = false
template = "Doğrulama kodunuz: {{ .Code }}"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false

# Sprint 1'de extensions eklenecek:
# - pgvector (semantic search için)
# - pg_trgm (Türkçe fuzzy match için)
# - uuid-ossp (gen_random_uuid backup)
